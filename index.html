<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot Level 5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <button id="themeBtn">🌙 Theme</button>
  <button id="clearBtn">🗑 Clear</button>
  <button id="exportBtn">📥 Export</button>
</div>

<div class="app">

  <div class="sidebar">
    <h3>🤖 AI Chat</h3>
    <p>Level 5 Pro</p>
  </div>

  <div class="chat-area">

    <div class="header">AI Assistant</div>

    <div id="chat-box"></div>

    <div class="input-box">
      <input type="text" id="userInput" placeholder="Type or speak...">
      <button id="micBtn">🎤</button>
      <button id="sendBtn">Send</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
